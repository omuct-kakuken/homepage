<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品詳細 - 革新的製品研究会 (革研)</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body class="work-detail-page">
    <header class="site-header">
        <div class="header-accent-line"></div>
        <div class="container header-container">
            <a href="../index.html" class="logo">
                <img src="../image/革研_横文字ロゴデータ.png" alt="革研 Logo" class="header-logo-img">
            </a>
            <nav class="site-nav">
                <ul class="nav-list">
                    <li><a href="../index.html" class="nav-link">HOME</a></li>
                    <li><a href="../index.html#works" class="nav-link active">WORKS</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="work-detail-hero section-spacing">
            <div class="container container-sm">
                <a href="../index.html#works" class="back-link mb-md">← Back to WORKS</a>
                <div class="work-detail-header fade-up">
                    <h1 class="work-detail-title">作品タイトル</h1>
                    <p class="work-detail-category text-muted">Category / Year</p>
                </div>

                <div class="work-detail-main-img fade-up delay-1">
                    <img src="../image/no image.jpg" alt="Work highlight" class="rounded-img shadow-md">
                </div>

                <div class="work-detail-content fade-up delay-2">
                    <div class="work-detail-description">
                        <h2 class="sub-heading">概要</h2>
                        <p>作品の詳細な説明文がここに入ります。Wixサイトからの情報を元に構成します。</p>
                    </div>

                    <div class="work-detail-specs card-minimal mt-lg">
                        <h3 class="specs-heading">Project Specs</h3>
                        <ul class="specs-list">
                            <li><strong>Member:</strong> Kakuken Team</li>
                            <li><strong>Tools:</strong> Rhino, Fusion360, 3D Printer...</li>
                            <li><strong>Status:</strong> Completed</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer section-spacing">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <div class="footer-logo">
                        <img src="../image/革新的製品研究会_ロゴ_文字入り.png" alt="革研 Logo">
                    </div>
                    <p class="footer-tagline">はみだす発想。革新的なモノづくりへ。</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 革新的製品研究会. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
</body>

</html>
